<!doctype html>

<html class="light" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Login | GeoSense IoT</title>
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com" rel="preconnect" />
        <link
            crossorigin=""
            href="https://fonts.gstatic.com"
            rel="preconnect"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap"
            rel="stylesheet"
        />
        <!-- Material Symbols -->
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "tertiary-fixed-dim": "#ffb3ad",
                            "on-error-container": "#93000a",
                            outline: "#737686",
                            "inverse-primary": "#b4c5ff",
                            "secondary-container": "#6cf8bb",
                            "surface-container-low": "#eff4ff",
                            "tertiary-fixed": "#ffdad7",
                            "on-secondary-fixed-variant": "#005236",
                            "surface-dim": "#cbdbf5",
                            "surface-bright": "#f8f9ff",
                            "on-surface-variant": "#434655",
                            "surface-container": "#e5eeff",
                            "surface-container-high": "#dce9ff",
                            "surface-container-highest": "#d3e4fe",
                            "on-tertiary": "#ffffff",
                            "on-primary": "#ffffff",
                            "on-tertiary-fixed-variant": "#930013",
                            "error-container": "#ffdad6",
                            "primary-fixed": "#dbe1ff",
                            "outline-variant": "#c3c6d7",
                            "surface-tint": "#0053db",
                            "on-secondary-container": "#00714d",
                            "primary-fixed-dim": "#b4c5ff",
                            primary: "#004ac6",
                            "on-primary-container": "#eeefff",
                            "secondary-fixed": "#6ffbbe",
                            "on-tertiary-fixed": "#410004",
                            "on-background": "#0b1c30",
                            "on-secondary": "#ffffff",
                            error: "#ba1a1a",
                            "surface-container-lowest": "#ffffff",
                            surface: "#f8f9ff",
                            "surface-variant": "#d3e4fe",
                            "on-tertiary-container": "#ffecea",
                            "on-primary-fixed-variant": "#003ea8",
                            "secondary-fixed-dim": "#4edea3",
                            secondary: "#006c49",
                            "on-secondary-fixed": "#002113",
                            background: "#f8f9ff",
                            "tertiary-container": "#cf2c30",
                            tertiary: "#ab0b1c",
                            "on-primary-fixed": "#00174b",
                            "primary-container": "#2563eb",
                            "on-error": "#ffffff",
                            "inverse-surface": "#213145",
                            "on-surface": "#0b1c30",
                            "inverse-on-surface": "#eaf1ff",
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                        fontFamily: {
                            headline: ["Manrope"],
                            body: ["Inter"],
                            label: ["Inter"],
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            .sentient-gradient {
                background: radial-gradient(
                    circle at 0% 0%,
                    #eff4ff 0%,
                    #f8f9ff 50%,
                    #d3e4fe 100%
                );
            }
            .ambient-shadow {
                box-shadow: 0px 20px 40px rgba(11, 28, 48, 0.06);
            }
        </style>
    </head>
    <body
        class="bg-surface font-body text-on-surface min-h-screen flex flex-col sentient-gradient"
    >
        <!-- Main Content Canvas -->
        <main class="flex-grow flex items-center justify-center p-6 sm:p-12">
            <!-- Auth Card -->
            <div
                class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 sm:p-10 ambient-shadow"
            >
                <!-- Brand & Header -->
                <div class="flex flex-col items-center mb-10 text-center">
                    <div class="mb-4 text-primary">
                        <span
                            class="material-symbols-outlined text-5xl"
                            style="font-variation-settings: &quot;FILL&quot; 1"
                            >landscape</span
                        >
                    </div>
                    <h1
                        class="font-headline font-extrabold text-2xl text-on-surface tracking-tighter mb-2"
                    >
                        GeoSense IoT
                    </h1>
                    <p
                        class="text-on-surface-variant font-label text-sm uppercase tracking-widest font-medium"
                    >
                        Landslide Monitoring System
                    </p>
                </div>
                <!-- Error State (Subtle Tonal Alert) -->
                <div
                    class="mb-6 bg-error-container/20 border border-error/10 rounded-lg p-3 flex items-center gap-3"
                >
                    <span class="material-symbols-outlined text-error text-lg"
                        >error</span
                    >
                    <p class="text-on-error-container text-xs font-medium">
                        Invalid credentials. Please verify your ID and password.
                    </p>
                </div>
                <!-- Login Form -->
                <form class="space-y-6">
                    <!-- Input Group: ID -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-semibold text-on-surface-variant ml-1 font-label"
                            for="identity"
                        >
                            Email or Device ID
                        </label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg"
                                >id_card</span
                            >
                            <input
                                class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest/50 border-none rounded-xl focus:ring-2 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all text-sm outline-none placeholder:text-outline/60"
                                id="identity"
                                placeholder="Enter your credentials"
                                type="text"
                            />
                        </div>
                    </div>
                    <!-- Input Group: Password -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-end px-1">
                            <label
                                class="block text-xs font-semibold text-on-surface-variant font-label"
                                for="password"
                            >
                                Password
                            </label>
                            <a
                                class="text-xs font-semibold text-primary hover:text-on-primary-fixed-variant transition-colors"
                                href="#"
                                >Forgot password?</a
                            >
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg"
                                >lock</span
                            >
                            <input
                                class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest/50 border-none rounded-xl focus:ring-2 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all text-sm outline-none placeholder:text-outline/60"
                                id="password"
                                placeholder="••••••••"
                                type="password"
                            />
                        </div>
                    </div>
                    <!-- Remember Me -->
                    <div class="flex items-center gap-3 px-1">
                        <div class="relative flex items-center">
                            <input
                                class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-highest/50 cursor-pointer"
                                id="remember"
                                type="checkbox"
                            />
                        </div>
                        <label
                            class="text-sm text-on-surface-variant cursor-pointer select-none"
                            for="remember"
                            >Remember this device</label
                        >
                    </div>
                    <!-- Primary Action (Loading State) -->
                    <button
                        class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 rounded-xl font-semibold shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3"
                        type="submit"
                    >
                        <!-- Loading Spinner SVG -->
                        <svg
                            class="animate-spin h-5 w-5 text-on-primary"
                            fill="none"
                            viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <circle
                                class="opacity-25"
                                cx="12"
                                cy="12"
                                r="10"
                                stroke="currentColor"
                                stroke-width="4"
                            ></circle>
                            <path
                                class="opacity-75"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                                fill="currentColor"
                            ></path>
                        </svg>
                        <span>Login</span>
                    </button>
                </form>
                <!-- Secondary Action -->
                <div class="mt-8 text-center">
                    <p class="text-sm text-on-surface-variant">
                        Don't have an account?
                        <a
                            class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/30"
                            href="#"
                            >Register</a
                        >
                    </p>
                </div>
            </div>
            <!-- Decorative Sentient Topography Element -->
            <div
                class="fixed bottom-0 left-0 w-full h-1/2 -z-10 opacity-30 pointer-events-none"
            >
                <img
                    class="w-full h-full object-cover"
                    data-alt="abstract topographical line art representing mountain ridges with soft blue and silver gradients against a clean white background"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBppTjXcpk_A1m88vnw4xoHlhMTSRzdGDPKer8pbWNppKYy5melHDKNC9W_lebXvIHAXwR_a7BE3xkDdZq8V8YDlAIxgcaaEx-ZMB7cHPjw2t56jxL7FQMsgale3Z5FTKdVnILTXi5oUMUJUKYgT7aMEcLQ4tBoiNXfX4thCQwVZnsxp1fBykE1ABj004t6W05ADuPEN6FXMiR3w-XTlY9zN0PRHcFyJ_youYnyMW08hnqKjYvVyIcEglWVZmP4tDoWOQcpBD2dZ5-D"
                />
            </div>
        </main>
        <!-- Footer from JSON -->
        <footer
            class="w-full max-w-7xl mx-auto px-8 py-12 flex flex-col md:flex-row justify-between items-center opacity-70 bg-transparent"
        >
            <div class="mb-4 md:mb-0">
                <span
                    class="text-lg font-bold text-[#0b1c30] dark:text-[#f8f9ff] font-headline tracking-tighter"
                    >GeoSense IoT</span
                >
            </div>
            <div class="flex flex-col md:flex-row items-center gap-6">
                <p
                    class="font-['Inter'] text-sm text-[#434655] dark:text-[#c3c6d7]"
                >
                    © 2024 Digital Geologist Systems. All rights reserved.
                </p>
                <div class="flex gap-4">
                    <a
                        class="font-['Inter'] text-sm text-[#434655] dark:text-[#c3c6d7] hover:text-[#2563eb] transition-all duration-200"
                        href="#"
                        >Privacy Policy</a
                    >
                    <a
                        class="font-['Inter'] text-sm text-[#434655] dark:text-[#c3c6d7] hover:text-[#2563eb] transition-all duration-200"
                        href="#"
                        >Terms of Service</a
                    >
                    <a
                        class="font-['Inter'] text-sm text-[#434655] dark:text-[#c3c6d7] hover:text-[#2563eb] transition-all duration-200"
                        href="#"
                        >Security</a
                    >
                </div>
            </div>
        </footer>
    </body>
</html>
